apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: application-from-scratch
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source: 
    helm:
      releaseName: app-from-helm
      valueFiles: # overwrite default value in values.yaml
        - custom-values.yaml
    path: helm/nginx
    repoURL: https://github.com/m0hadang/test-argocd.git
    targetRevision: main
