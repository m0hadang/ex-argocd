apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: application-from-scratch
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source: 
    helm:
      releaseName: app-from-helm # can change application release name
    path: helm/nginx
    repoURL: https://github.com/m0hadang/test-argocd.git
    targetRevision: main
